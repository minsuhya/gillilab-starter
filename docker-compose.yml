services:
  backend:
    build: ./backend
    ports:
      - "127.0.0.1:8005:8000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - APP_ENV=development
      - DATABASE_URL=sqlite+aiosqlite:///./data/tasks.db
      - CORS_ORIGINS=http://localhost:3005
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    develop:
      watch:
        - action: sync+restart
          path: ./backend/app
          target: /app/app

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8005
    ports:
      - "127.0.0.1:3005:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src
